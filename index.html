<!DOCTYPE html>
<!-- ================================================================
     百闻牌模拟器 v1.0 — by流光 — Q群：1078494503
     改版本号只需改下面 JS 里的 APP_VERSION = 'vX.X' 即可
     ================================================================ -->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>百闻牌模拟器</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>
  <!-- ================================================================
       HTML：房间连接覆盖层（创建/加入房间）
       ================================================================ -->
  <div class="room-overlay" id="room-overlay">
    <div class="room-dialog" id="room-dialog">
      <!-- 主页 -->
      <div id="room-home">
        <h2 id="room-title">🎴 百闻牌模拟器</h2>
        <p class="room-subtitle">创建或加入房间开始联机</p>
        <div class="room-actions">
          <button type="button" class="room-btn room-btn--create" id="room-btn-create">🏠 创建房间</button>
          <div class="room-join-row">
            <input type="text" id="room-join-input" placeholder="输入房间号" maxlength="12" autocomplete="off">
            <button type="button" class="room-btn room-btn--join" id="room-btn-join">🚪 加入</button>
          </div>
          <button type="button" class="room-btn room-btn--join" id="room-btn-spectate" style="background:linear-gradient(180deg,#6a5a8a,#4a3a6a);border-color:rgba(180,160,220,0.6);">👁 观众观战</button>
          <button type="button" class="room-btn room-btn--create" id="room-btn-solo" style="background:linear-gradient(180deg,#5a8a8a,#3a6a6a);border-color:rgba(140,220,200,0.6);">🎮 单人模式</button>
        </div>
      </div>
      <!-- 正在连接中 -->
      <div id="room-joining" hidden>
        <h2>🔗 正在连接</h2>
        <p class="room-subtitle"><span class="spinner"></span>尝试建立连接…</p>
        <div class="room-actions" style="margin-top:16px;">
          <button type="button" class="room-btn room-btn--back" id="room-btn-join-cancel">取消</button>
        </div>
      </div>
      <!-- 等待对手 -->
      <div id="room-waiting" hidden>
        <h2>⏳ 等待对手加入</h2>
        <p class="room-subtitle">将房间号分享给好友</p>
        <div class="room-id-display">
          <div class="room-id-label">房间号</div>
          <div class="room-id-code" id="room-id-code">------</div>
        </div>
        <div class="room-status">
          <span class="dot dot--waiting"></span>等待对手连接…
        </div>
        <div class="room-actions" style="margin-top:16px;">
          <button type="button" class="room-btn room-btn--copy" id="room-btn-copy">📋 复制房间号</button>
          <button type="button" class="room-btn room-btn--back" id="room-btn-back">返回</button>
        </div>
      </div>
      <div class="room-credits">by流光　Q群：1078494503</div>
    </div>
  </div>

  <!-- 连接状态栏（游戏中显示） -->
  <div class="conn-status-bar" id="conn-status-bar" hidden>
    <span class="conn-dot conn-dot--ok" id="conn-dot"></span>
    <span id="conn-status-text">已连接</span>
  </div>

  <!-- ================================================================
       HTML：游戏主面板
       ================================================================ -->
  <div class="game-board">
    <div class="board-main">
      <!-- 玩家一（上方） -->
      <section class="player-zone player-zone--top" data-player="1">
        <div class="zone-effects">
          <div class="effects-panel"></div>
          <button type="button" class="btn-add-effect">添加幻境/效果</button>
          <div class="player-id-area">
            <div class="player-avatar-name-row">
              <div class="player-avatar" data-avatar-player="1" title="点击更换头像">
                <span class="avatar-placeholder">头像</span>
              </div>
              <div class="player-name-col">
                <label class="player-heart" title="玩家生命">
                  <svg viewBox="0 0 36 38" aria-hidden="true">
                    <path fill="#c0392b" d="M18 1 C18 1 3 16 3 24 C3 30 9 35 18 35 C27 35 33 30 33 24 C33 16 18 1 18 1 Z"/>
                  </svg>
                  <input type="text" class="player-hp-input" placeholder="命" aria-label="玩家生命" maxlength="6">
                </label>
                <input type="text" class="player-name-input" value="玩家一" aria-label="玩家名称">
              </div>
              <div class="player-fire-area">
                <div class="fire-control-row">
                  <span class="fire-label">鬼火：</span>
                  <button type="button" class="fire-btn fire-minus" aria-label="减少鬼火">−</button>
                  <button type="button" class="fire-btn fire-plus" aria-label="增加鬼火">+</button>
                </div>
                <div class="fire-icons-row"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="zone-center">
          <div class="field-layout">
            <div class="deck-toolbar-row">
              <div class="deck-btn-group deck-btn-group--hand">
                <button type="button" class="btn-deck" data-action="draw">抽牌</button>
                <button type="button" class="btn-deck" data-action="hand">手牌</button>
                <button type="button" class="btn-deck" data-action="add-hand">置入手牌</button>
              </div>
              <div class="deck-toolbar-center" aria-hidden="true"></div>
              <div class="deck-btn-group deck-btn-group--deck">
                <button type="button" class="btn-deck" data-action="import-deck">导入卡组</button>
                <button type="button" class="btn-deck" data-action="deck">牌库</button>
                <button type="button" class="btn-deck" data-action="add-deck">置入牌库</button>
                <button type="button" class="btn-deck" data-action="shuffle-deck">洗牌库</button>
              </div>
            </div>
            <div class="area-label field-label">准备区</div>
            <div class="field-row">
              <div class="prep-group">
                <div class="card-slot" data-slot-type="prep"></div>
                <div class="card-slot" data-slot-type="prep"></div>
              </div>
              <div class="battle-block">
                <div class="area-label">战斗区</div>
                <div class="card-slot" data-slot-type="battle"></div>
              </div>
              <div class="prep-group">
                <div class="card-slot" data-slot-type="prep"></div>
                <div class="card-slot" data-slot-type="prep"></div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- 中心骰子栏 + 发言按钮（标签在黄线外） -->
      <div class="center-dice-bar">
        <!-- 标签位于黄线之外 -->
        <span class="zone-owner-tag zone-owner-tag--yours tag-above-bar" id="tag-your" hidden>👤 你的区域</span>
        <span class="zone-owner-tag zone-owner-tag--opponent tag-below-bar" id="tag-opp" hidden>🔒 对手区域</span>
        <!-- 观众名称行 -->
        <div id="spectator-name-row" hidden>
          <span class="zone-owner-tag zone-owner-tag--spec">👁 观众模式</span>
          <input type="text" id="spectator-name-input" value="观众1" maxlength="8" aria-label="观众名称">
        </div>

        <div class="dice-panel">
          <input type="number" id="dice-min" value="1" aria-label="最小值">
          <span class="dice-panel__sep">~</span>
          <input type="number" id="dice-max" value="6" aria-label="最大值">
          <button type="button" class="btn-dice-roll" id="btn-dice-roll" aria-label="投掷骰子">
            投掷
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="3" width="18" height="18" rx="3" fill="#f5f0e8" stroke="#8a7a6a" stroke-width="1.2"/>
              <circle cx="8" cy="8" r="1.4" fill="#333"/>
              <circle cx="16" cy="8" r="1.4" fill="#333"/>
              <circle cx="12" cy="12" r="1.4" fill="#333"/>
              <circle cx="8" cy="16" r="1.4" fill="#333"/>
              <circle cx="16" cy="16" r="1.4" fill="#333"/>
            </svg>
          </button>
        </div>
        <div class="damage-panel">
          <button type="button" class="btn-damage-mode" id="btn-damage-mode">🔄 造成伤害</button>
          <input type="number" id="damage-value" value="1" min="1" aria-label="伤害/恢复值">
          <button type="button" class="btn-damage" id="btn-damage">🎯 选择目标</button>
        </div>
        <button type="button" class="btn-ko" id="btn-ko">💀 气绝/复活</button>
        <button type="button" class="btn-countdown" id="btn-countdown">⏳ 倒计时</button>
        <button type="button" class="btn-energy" id="btn-energy">🏮 能量</button>
        <button type="button" class="btn-speak-unified" id="btn-speak-unified">💬 发言</button>
      </div>

      <!-- 玩家二（下方） -->
      <section class="player-zone player-zone--bottom" data-player="2">
        <div class="zone-effects">
          <div class="effects-panel"></div>
          <button type="button" class="btn-add-effect">添加幻境/效果</button>
          <div class="player-id-area">
            <div class="player-avatar-name-row">
              <div class="player-avatar" data-avatar-player="2" title="点击更换头像">
                <span class="avatar-placeholder">头像</span>
              </div>
              <div class="player-name-col">
                <label class="player-heart" title="玩家生命">
                  <svg viewBox="0 0 36 38" aria-hidden="true">
                    <path fill="#c0392b" d="M18 1 C18 1 3 16 3 24 C3 30 9 35 18 35 C27 35 33 30 33 24 C33 16 18 1 18 1 Z"/>
                  </svg>
                  <input type="text" class="player-hp-input" placeholder="命" aria-label="玩家生命" maxlength="6">
                </label>
                <input type="text" class="player-name-input" value="玩家二" aria-label="玩家名称">
              </div>
              <div class="player-fire-area">
                <div class="fire-control-row">
                  <span class="fire-label">鬼火：</span>
                  <button type="button" class="fire-btn fire-minus" aria-label="减少鬼火">−</button>
                  <button type="button" class="fire-btn fire-plus" aria-label="增加鬼火">+</button>
                </div>
                <div class="fire-icons-row"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="zone-center">
          <div class="field-layout">
            <div class="deck-toolbar-row">
              <div class="deck-btn-group deck-btn-group--hand">
                <button type="button" class="btn-deck" data-action="draw">抽牌</button>
                <button type="button" class="btn-deck" data-action="hand">手牌</button>
                <button type="button" class="btn-deck" data-action="add-hand">置入手牌</button>
              </div>
              <div class="deck-toolbar-center" aria-hidden="true"></div>
              <div class="deck-btn-group deck-btn-group--deck">
                <button type="button" class="btn-deck" data-action="import-deck">导入卡组</button>
                <button type="button" class="btn-deck" data-action="deck">牌库</button>
                <button type="button" class="btn-deck" data-action="add-deck">置入牌库</button>
                <button type="button" class="btn-deck" data-action="shuffle-deck">洗牌库</button>
              </div>
            </div>
            <div class="area-label field-label">准备区</div>
            <div class="field-row">
              <div class="prep-group">
                <div class="card-slot" data-slot-type="prep"></div>
                <div class="card-slot" data-slot-type="prep"></div>
              </div>
              <div class="battle-block">
                <div class="area-label">战斗区</div>
                <div class="card-slot" data-slot-type="battle"></div>
              </div>
              <div class="prep-group">
                <div class="card-slot" data-slot-type="prep"></div>
                <div class="card-slot" data-slot-type="prep"></div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>

    <!-- 右侧聊天栏 -->
    <aside class="chat-sidebar" aria-label="聊天区域">
      <div class="chat-section chat-section--system">
        <div class="chat-section-title" id="sys-chat-title">📢 系统信息</div>
        <div class="chat-section-body" id="chat-system-log"></div>
      </div>
      <div class="chat-section chat-section--player">
        <div class="chat-section-title">💬 聊天大厅</div>
        <div class="chat-section-body" id="chat-player-log"></div>
      </div>
    </aside>
  </div>

  <div class="speak-dialog-overlay" id="speak-dialog-overlay" hidden>
    <div class="speak-dialog" role="dialog" aria-labelledby="speak-dialog-title">
      <h3 id="speak-dialog-title">发言</h3>
      <textarea id="speak-dialog-input" placeholder="输入发言内容…" rows="3"></textarea>
      <div class="speak-dialog-actions">
        <button type="button" class="btn-dialog-cancel" id="speak-dialog-cancel">取消</button>
        <button type="button" class="btn-dialog-confirm" id="speak-dialog-confirm">确定</button>
      </div>
    </div>
  </div>

  <div class="speak-dialog-overlay" id="card-text-dialog-overlay" hidden>
    <div class="speak-dialog" role="dialog" aria-labelledby="card-text-dialog-title">
      <h3 id="card-text-dialog-title">输入</h3>
      <textarea id="card-text-dialog-input" placeholder="输入内容…" rows="5"></textarea>
      <div class="speak-dialog-actions">
        <button type="button" class="btn-dialog-cancel" id="card-text-dialog-cancel">取消</button>
        <button type="button" class="btn-dialog-confirm" id="card-text-dialog-confirm">确定</button>
      </div>
    </div>
  </div>

  <div class="speak-dialog-overlay" id="card-list-dialog-overlay" hidden>
    <div class="speak-dialog card-list-dialog" role="dialog" aria-labelledby="card-list-dialog-title">
      <h3 id="card-list-dialog-title">列表</h3>
      <div class="card-list" id="card-list-dialog-body"></div>
      <div class="speak-dialog-actions">
        <button type="button" class="btn-dialog-confirm" id="card-list-dialog-close">关闭</button>
      </div>
    </div>
  </div>

  <svg id="damage-line-svg"><line id="damage-line" stroke="#f66" stroke-width="2" stroke-dasharray="6,4" opacity="0.8"/></svg>
  <input type="file" id="image-input" accept="image/*">
  <input type="file" id="avatar-input" accept="image/*">

  <!-- 卡牌信息浮窗 -->
  <div id="card-tooltip" class="card-tooltip" hidden>
    <div class="card-tooltip__header">
      <span class="card-tooltip__badge"></span>
      <span class="card-tooltip__name"></span>
      <span class="card-tooltip__tag"></span>
    </div>
    <div class="card-tooltip__stats"></div>
    <div class="card-tooltip__effect"></div>
  </div>

  <script src="data/cards.js"></script>
  <script src="app.js"></script>
</body>
</html>
