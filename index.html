<!DOCTYPE html>
<!-- ================================================================
     百闻牌模拟器 v1.0 — by流光 — Q群：1078494503
     改版本号只需改下面 JS 里的 APP_VERSION = 'vX.X' 即可
     ================================================================ -->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>百闻牌模拟器</title>
  <style>
    /* ================================================================
       CSS 基础重置
       ================================================================ */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #e8e8e8;
      overflow: hidden;
    }

    /* ================================================================
       游戏面板整体布局（flex 横向：左侧战场 + 右侧聊天栏）
       ================================================================ */
    .game-board {
      --center-gap: clamp(20px, 3.5vh, 48px);
      --chat-width: clamp(200px, 22vw, 280px);
      --field-gap: 32px;
      --card-w-prep: 138px;
      --card-h-prep: 193px;
      --card-w-battle: 148px;
      --card-h-battle: 207px;
      display: flex;
      flex-direction: row;
      height: 100vh;
      padding: 8px;
      gap: 10px;
    }

    .board-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
    }

    /* ================================================================
       中心骰子栏（界面水平分割线）
       ================================================================ */
    .center-dice-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 16px;
      gap: 16px;
      border-top: 3px solid rgba(255, 215, 0, 0.4);
      border-bottom: 3px solid rgba(255, 215, 0, 0.4);
      background: rgba(22, 32, 52, 0.88);
      z-index: 4;
      position: relative;
    }

    /* 标签：位于中心栏黄线之外，形状与发言按钮一致 */
    .tag-above-bar {
      position: absolute;
      bottom: calc(100% + 8px);
      right: 16px;
    }

    .tag-below-bar {
      position: absolute;
      top: calc(100% + 8px);
      right: 16px;
    }

    /* 观众名称行 */
    #spectator-name-row {
      position: absolute;
      bottom: calc(100% + 8px);
      right: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #spectator-name-row[hidden] { display: none; }

    .zone-owner-tag--spec {
      background: rgba(200, 170, 60, 0.35);
      border: 2px solid rgba(220, 190, 80, 0.7);
      color: #f0d060;
    }

    #spectator-name-input {
      width: 64px;
      padding: 2px 6px;
      border: 1px solid #8a7a4a;
      border-radius: 4px;
      background: #1e2a3a;
      color: #f0d060;
      font-size: 12px;
      text-align: center;
      outline: none;
      font-weight: 600;
    }

    #spectator-name-input:focus {
      border-color: #f0d060;
    }

    .dice-panel {
      display: flex;
      align-items: center;
      gap: 4px 6px;
      padding: 5px 10px;
      min-width: auto;
      border: 2px solid rgba(150, 180, 220, 0.55);
      border-radius: 10px;
      background: rgba(18, 28, 48, 0.82);
      font-size: 13px;
      color: rgba(210, 220, 240, 0.95);
      flex-shrink: 0;
    }

    .dice-panel__sep {
      color: rgba(180, 200, 230, 0.7);
      font-weight: 600;
      white-space: nowrap;
    }

    .dice-panel input[type="number"] {
      width: 44px;
      padding: 5px 4px;
      border: 1px solid #5a7090;
      border-radius: 5px;
      background: #1e2a3a;
      color: #eee;
      font-size: 13px;
      text-align: center;
      outline: none;
      -moz-appearance: textfield;
      appearance: textfield;
    }

    .dice-panel input[type="number"]::-webkit-inner-spin-button,
    .dice-panel input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .dice-panel input[type="number"]:focus {
      border-color: rgba(255, 215, 0, 0.6);
      box-shadow: 0 0 0 2px rgba(255, 215, 0, 0.12);
    }

    .btn-dice-roll {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 600;
      background: linear-gradient(180deg, #6a5a8a, #4a3a6a);
      border: 1px solid rgba(180, 160, 220, 0.55);
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-dice-roll:hover {
      background: linear-gradient(180deg, #7a6a9a, #5a4a7a);
    }

    .btn-dice-roll:active {
      transform: scale(0.98);
    }

    .btn-dice-roll svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* 伤害面板 */
    .damage-panel {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border: 2px solid rgba(220, 120, 100, 0.5);
      border-radius: 8px;
      background: rgba(30, 15, 15, 0.65);
      font-size: 13px;
      color: rgba(240, 180, 160, 0.95);
      flex-shrink: 0;
    }

    .damage-panel__label {
      white-space: nowrap;
    }

    .damage-panel input[type="number"] {
      width: 48px;
      padding: 4px 4px;
      border: 1px solid #8a4a4a;
      border-radius: 5px;
      background: #2a1a1a;
      color: #fcc;
      font-size: 13px;
      text-align: center;
      outline: none;
      -moz-appearance: textfield;
      appearance: textfield;
    }

    .damage-panel input[type="number"]::-webkit-inner-spin-button,
    .damage-panel input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .damage-panel input[type="number"]:focus {
      border-color: rgba(255, 140, 100, 0.7);
    }

    /* 恢复生命时整个面板变绿色 */
    .damage-panel.is-heal {
      border-color: rgba(100, 200, 130, 0.5);
      background: rgba(15, 30, 18, 0.65);
      color: rgba(160, 240, 180, 0.95);
    }

    .damage-panel.is-heal input[type="number"] {
      border-color: #4a8a4a;
      background: #1a2a1a;
      color: #cfc;
    }

    .damage-panel.is-heal input[type="number"]:focus {
      border-color: rgba(100, 220, 140, 0.7);
    }

    .btn-damage {
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 600;
      background: linear-gradient(180deg, #8a4a3a, #6a2a1a);
      border: 1px solid rgba(220, 140, 120, 0.55);
      border-radius: 6px;
      color: #fcc;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    .btn-damage:hover {
      background: linear-gradient(180deg, #9a5a4a, #7a3a2a);
    }

    .btn-damage.active {
      background: linear-gradient(180deg, #a04030, #802020);
      border-color: #f44;
      animation: pulse-damage 0.8s ease-in-out infinite;
    }

    @keyframes pulse-damage {
      0%, 100% { box-shadow: 0 0 6px rgba(255,60,30,0.4); }
      50% { box-shadow: 0 0 16px rgba(255,60,30,0.8); }
    }

    /* 恢复生命时选择目标按钮变绿色 */
    .damage-panel.is-heal .btn-damage {
      background: linear-gradient(180deg, #3a7a4a, #1a5a2a);
      border-color: rgba(120, 210, 150, 0.55);
      color: #cfc;
    }

    .damage-panel.is-heal .btn-damage:hover {
      background: linear-gradient(180deg, #4a8a5a, #2a6a3a);
    }

    .damage-panel.is-heal .btn-damage.active {
      background: linear-gradient(180deg, #30a040, #208020);
      border-color: #4f4;
      animation: pulse-heal 0.8s ease-in-out infinite;
    }

    @keyframes pulse-heal {
      0%, 100% { box-shadow: 0 0 6px rgba(60,255,80,0.4); }
      50% { box-shadow: 0 0 16px rgba(60,255,80,0.8); }
    }

    /* 伤害瞄准线 */
    #damage-line-svg {
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      display: none;
    }

    /* 伤害/恢复 模式切换按钮（样式与选择目标按钮一致） */
    .btn-damage-mode {
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 600;
      background: linear-gradient(180deg, #8a4a3a, #6a2a1a);
      border: 1px solid rgba(220, 140, 120, 0.55);
      border-radius: 6px;
      color: #fcc;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      flex-shrink: 0;
    }

    .btn-damage-mode:hover {
      background: linear-gradient(180deg, #9a5a4a, #7a3a2a);
    }

    .btn-damage-mode.is-heal {
      background: linear-gradient(180deg, #3a7a4a, #1a5a2a);
      border-color: rgba(120, 210, 150, 0.55);
      color: #cfc;
    }

    .btn-damage-mode.is-heal:hover {
      background: linear-gradient(180deg, #4a8a5a, #2a6a3a);
    }

    /* 倒计时 / 能量 按钮（紧凑粉色系） */
    .btn-countdown,
    .btn-energy {
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .btn-countdown {
      background: linear-gradient(180deg, #8a4a6a, #6a2a4a);
      border: 1px solid rgba(220, 140, 180, 0.55);
      color: #fce;
    }

    .btn-countdown:hover {
      background: linear-gradient(180deg, #9a5a7a, #7a3a5a);
    }

    .btn-countdown.active {
      background: linear-gradient(180deg, #b05070, #903050);
      border-color: #f6c;
      animation: pulse-countdown 0.8s ease-in-out infinite;
    }

    .btn-energy {
      background: linear-gradient(180deg, #8a6a7a, #6a4a5a);
      border: 1px solid rgba(220, 180, 200, 0.55);
      color: #fde;
    }

    .btn-energy:hover {
      background: linear-gradient(180deg, #9a7a8a, #7a5a6a);
    }

    .btn-energy.active {
      background: linear-gradient(180deg, #b080a0, #906080);
      border-color: #fae;
      animation: pulse-energy 0.8s ease-in-out infinite;
    }

    @keyframes pulse-countdown {
      0%, 100% { box-shadow: 0 0 6px rgba(255,150,200,0.4); }
      50% { box-shadow: 0 0 16px rgba(255,150,200,0.8); }
    }

    @keyframes pulse-energy {
      0%, 100% { box-shadow: 0 0 6px rgba(255,200,230,0.4); }
      50% { box-shadow: 0 0 16px rgba(255,200,230,0.8); }
    }

    /* 倒计时 / 能量 徽章（右上角） */
    .card-badge--countdown,
    .card-badge--energy {
      top: 0;
      right: 0;
      width: 38px;
      height: 38px;
      transform: translate(50%, -50%);
      border-radius: 50%;
      flex-direction: column;
      gap: 0;
    }

    .card-badge--countdown {
      background: radial-gradient(circle, #c06090, #8a3050);
      border-color: rgba(255, 160, 200, 0.85);
    }

    .card-badge--energy {
      background: radial-gradient(circle, #d0a0c0, #a06080);
      border-color: rgba(255, 200, 230, 0.85);
    }

    .card-badge--countdown .badge-icon,
    .card-badge--energy .badge-icon {
      position: absolute;
      top: -10px;
      left: -13px;
      font-size: 24px;
      line-height: 1;
      pointer-events: none;
      opacity: 0.95;
      z-index: 0;
    }

    .card-badge--countdown input,
    .card-badge--energy input {
      position: relative;
      z-index: 1;
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      margin-top: 4px;
      text-shadow: 0 0 4px rgba(0,0,0,0.5);
    }

    /* 气绝按钮（暗紫色） */
    .btn-ko {
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 600;
      background: linear-gradient(180deg, #5a3a5a, #3a1a3a);
      border: 1px solid rgba(180, 140, 200, 0.55);
      border-radius: 6px;
      color: #dac;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .btn-ko:hover {
      background: linear-gradient(180deg, #6a4a6a, #4a2a4a);
    }

    .btn-ko.active {
      background: linear-gradient(180deg, #805080, #603060);
      border-color: #c9c;
      animation: pulse-ko 0.8s ease-in-out infinite;
    }

    @keyframes pulse-ko {
      0%, 100% { box-shadow: 0 0 6px rgba(200,140,220,0.4); }
      50% { box-shadow: 0 0 16px rgba(200,140,220,0.8); }
    }

    /* 气绝遮罩 */
    .ko-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 1;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
    }

    .ko-circle {
      position: relative;
      width: 50%;
      aspect-ratio: 1;
      border-radius: 50%;
      border: 3px solid rgba(200, 160, 220, 0.85);
      background: rgba(40, 20, 50, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ko-circle .ko-icon {
      position: absolute;
      top: -12px;
      left: -12px;
      font-size: 33px;
      line-height: 1;
      pointer-events: none;
      z-index: 1;
    }

    .ko-circle input {
      width: 100%;
      border: none;
      background: transparent;
      color: #fff;
      text-align: center;
      font-size: 27px;
      font-weight: 700;
      outline: none;
      padding: 0;
      text-shadow: 0 0 4px rgba(0,0,0,0.6);
    }

    /* ================================================================
       玩家区域（上/下半场）
       ================================================================ */
    .player-zone {
      flex: 1;
      display: flex;
      min-height: 0;
      padding: 10px 16px;
      gap: 20px;
      position: relative;
    }

    .player-zone--top {
      border-bottom: none;
      background: rgba(30, 40, 70, 0.6);
      padding-bottom: 28px;
    }

    .player-zone--bottom {
      border-top: none;
      background: rgba(25, 35, 60, 0.6);
      padding-top: 28px;
    }

    .player-zone--bottom .zone-effects {
      flex-direction: column-reverse;
    }

    /* ================================================================
       效果/幻境面板（左侧工具栏）
       ================================================================ */
    .zone-effects {
      width: clamp(170px, 20vw, 260px);
      min-width: 160px;
      max-width: 260px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      min-height: 0;
      gap: 8px;
    }

    /* 玩家身份区（位于效果面板下方，正常流，左对齐） */
    .player-id-area {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
    }

    .player-avatar-name-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .player-name-col {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
    }

    /* 鬼火区域：名字右侧，上下两排左对齐 */
    .player-fire-area {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      flex-shrink: 0;
    }

    .fire-control-row {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .fire-label {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255, 200, 80, 0.9);
      user-select: none;
    }

    .fire-btn {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1px solid rgba(255, 150, 40, 0.55);
      background: rgba(30, 20, 10, 0.8);
      color: #ff9922;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      line-height: 1;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }

    .fire-btn:hover {
      background: rgba(90, 50, 15, 0.9);
      color: #ffcc55;
      border-color: rgba(255, 180, 60, 0.8);
    }

    .fire-btn:active {
      transform: scale(0.9);
    }

    .fire-icons-row {
      display: flex;
      align-items: center;
      gap: 0;
    }

    .fire-icon {
      font-size: 32px;
      line-height: 1;
      user-select: none;
      filter: drop-shadow(0 1px 3px rgba(255, 140, 0, 0.5));
    }

    .player-id-area .player-heart {
      position: relative;
      width: 69px;
      height: 60px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: text;
    }

    .player-id-area .player-heart svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.35));
    }

    .player-id-area .player-heart input {
      position: relative;
      z-index: 1;
      width: 45px;
      border: none;
      background: transparent;
      color: #fff;
      font-size: 27px;
      font-weight: 700;
      text-align: center;
      outline: none;
      padding: 0;
      margin-top: 5px;
    }

    .player-id-area .player-heart input::placeholder {
      color: rgba(255, 255, 255, 0.45);
      font-weight: 500;
      font-size: 20px;
    }

    .player-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid rgba(200, 200, 220, 0.6);
      overflow: hidden;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(20, 30, 50, 0.6);
      transition: border-color 0.2s;
    }

    .player-avatar:hover {
      border-color: rgba(255, 215, 0, 0.7);
    }

    .player-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .player-avatar .avatar-placeholder {
      font-size: 15px;
      color: rgba(150, 170, 200, 0.55);
      pointer-events: none;
      font-weight: 600;
    }

    .player-avatar.has-avatar .avatar-placeholder {
      display: none;
    }

    .player-id-area .player-name-input {
      width: 72px;
      padding: 3px 5px;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255, 215, 0, 0.95);
      background: rgba(20, 30, 50, 0.8);
      border: 1px solid rgba(255, 215, 0, 0.45);
      border-radius: 6px;
      outline: none;
      text-align: center;
    }

    .player-id-area .player-name-input:focus {
      border-color: rgba(255, 215, 0, 0.85);
      box-shadow: 0 0 0 2px rgba(255, 215, 0, 0.15);
    }

    .btn-add-effect {
      flex-shrink: 0;
      padding: 6px 10px;
      font-size: 12px;
      background: linear-gradient(180deg, #4a6fa5, #3d5a80);
      border: 1px solid #6b8cae;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
      text-align: center;
      margin: 0;
    }

    .btn-add-effect:hover {
      background: linear-gradient(180deg, #5a7fb5, #4d6a90);
    }

    .btn-add-effect:active {
      transform: scale(0.98);
    }



    .effects-panel {
      flex: 1;
      border: 2px solid rgba(150, 180, 220, 0.5);
      border-radius: 10px;
      background: rgba(20, 30, 50, 0.5);
      padding: 10px;
      overflow-y: auto;
      overflow-x: hidden;
      min-height: 100px;
      min-width: 0;
    }

    .effect-item {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      padding: 6px 8px;
      background: rgba(40, 55, 85, 0.7);
      border-radius: 6px;
      border: 1px solid rgba(100, 130, 180, 0.3);
    }

    .effect-item input[type="text"] {
      padding: 5px 8px;
      border: 1px solid #5a7090;
      border-radius: 4px;
      background: #1e2a3a;
      color: #eee;
      font-size: 13px;
    }

    .effect-item input.effect-name {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .effect-item input.effect-value {
      width: 44px;
      flex-shrink: 0;
      text-align: center;
    }

    .btn-remove-effect {
      padding: 4px 8px;
      font-size: 11px;
      background: #8b3a3a;
      border: 1px solid #a05050;
      border-radius: 4px;
      color: #fff;
      cursor: pointer;
      flex-shrink: 0;
    }

    .btn-remove-effect:hover {
      background: #a04545;
    }

    /* ================================================================
       战场中间区域（准备区 + 战斗区 + 牌库工具栏）
       ================================================================ */
    .zone-center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: center;
      min-width: 0;
      padding: 4px 0;
    }

    .player-zone--top .zone-center {
      justify-content: flex-start;
    }

    .player-zone--bottom .zone-center {
      justify-content: flex-end;
    }

    .field-layout {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    .field-row {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      gap: var(--field-gap);
      padding-inline: var(--field-gap);
      box-sizing: border-box;
    }

    .prep-group {
      display: flex;
      gap: var(--field-gap);
      flex-shrink: 0;
    }

    .battle-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      z-index: 2;
    }

    .deck-toolbar-row {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      gap: clamp(16px, 2.5vw, 40px);
      flex-shrink: 0;
      min-height: 38px;
    }

    .player-zone--top .deck-toolbar-row {
      order: -1;
      margin-bottom: 6px;
    }

    .player-zone--bottom .deck-toolbar-row {
      order: 3;
      margin-top: 6px;
    }

    .deck-toolbar-center {
      width: var(--card-w-battle);
      flex-shrink: 0;
      pointer-events: none;
    }

    .deck-btn-group {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .deck-btn-group--hand {
      justify-content: flex-end;
    }

    .deck-btn-group--deck {
      justify-content: flex-start;
    }

    .btn-deck {
      padding: 6px 10px;
      font-size: 12px;
      white-space: nowrap;
      background: linear-gradient(180deg, #455a7a, #354860);
      border: 1px solid rgba(120, 150, 190, 0.55);
      border-radius: 5px;
      color: #eef2f8;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-deck:hover {
      background: linear-gradient(180deg, #556a8a, #455870);
    }

    .btn-deck:active {
      transform: scale(0.98);
    }

    .btn-deck:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    /* 战斗区略向中间靠拢，但保留上下间距避免重叠 */
    .player-zone--top .battle-block {
      transform: translateY(18%);
      margin-bottom: 8px;
    }

    .player-zone--bottom .battle-block {
      transform: translateY(-18%);
      margin-top: 8px;
    }

    /* 中央留白：上下战斗区之间额外间距 */
    .player-zone--top .zone-center {
      padding-bottom: var(--center-gap);
    }

    .player-zone--bottom .zone-center {
      padding-top: var(--center-gap);
    }

    .area-label {
      font-size: 13px;
      color: rgba(180, 200, 230, 0.8);
      margin-bottom: 8px;
      text-align: center;
      white-space: nowrap;
    }

    .field-label {
      align-self: flex-start;
      margin-left: 0;
      margin-bottom: 6px;
    }

    .player-zone--bottom .field-label {
      align-self: flex-start;
      margin-top: 6px;
      margin-bottom: 0;
      order: 2;
    }

    .player-zone--bottom .field-row {
      order: 1;
    }

    /* ================================================================
       卡牌槽（准备区/战斗区通用）
       ================================================================ */
    .card-slot {
      --card-w: var(--card-w-prep);
      --card-h: var(--card-h-prep);
      width: var(--card-w);
      height: var(--card-h);
      border: 2px dashed rgba(180, 200, 230, 0.55);
      border-radius: 12px;
      background: rgba(25, 35, 55, 0.6);
      cursor: pointer;
      position: relative;
      overflow: visible;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      flex-shrink: 0;
    }

    .card-slot[data-slot-type="battle"] {
      --card-w: var(--card-w-battle);
      --card-h: var(--card-h-battle);
      border-color: rgba(255, 180, 100, 0.55);
    }

    .card-slot:hover {
      border-color: rgba(255, 215, 0, 0.6);
      box-shadow: 0 0 12px rgba(255, 215, 0, 0.15);
    }

    .card-slot.dragging {
      opacity: 0.55;
      transform: scale(0.96);
      z-index: 10;
    }

    .card-slot.drag-over {
      border-color: #ffd700;
      border-style: solid;
      box-shadow: 0 0 16px rgba(255, 215, 0, 0.35);
    }

    .card-art {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(18, 26, 42, 0.5);
      pointer-events: none;
    }

    .card-art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-slot .placeholder-hint {
      font-size: 12px;
      line-height: 1.4;
      color: rgba(150, 170, 200, 0.55);
      text-align: center;
      padding: 8px;
      user-select: none;
    }

    .card-slot.has-image .placeholder-hint {
      display: none;
    }

    /* ================================================================
       卡牌徽章（等级菱形、攻击/生命圆形、名称长条）
       ================================================================ */
    .card-badge {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(22, 32, 52, 0.95);
      border: 2px solid rgba(200, 210, 230, 0.75);
      z-index: 3;
      cursor: text;
      pointer-events: auto;
    }

    .card-badge input {
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
      color: #f0f0f0;
      text-align: center;
      outline: none;
      font-weight: 700;
      padding: 0;
    }

    .card-badge input::placeholder {
      color: rgba(180, 190, 210, 0.45);
      font-weight: 500;
      font-size: 10px;
    }

    /* 左上：圆角菱形（等级 1-3） */
    .card-badge--level {
      top: 0;
      left: 0;
      width: 34px;
      height: 34px;
      transform: translate(-50%, -50%) rotate(45deg);
      border-radius: 8px;
      background: linear-gradient(135deg, #5a4a8a, #3d3568);
      border-color: rgba(180, 160, 255, 0.8);
    }

    .card-badge--level input {
      transform: rotate(-45deg);
      font-size: 20px;
    }

    /* 左下 / 右下：圆形（攻击 / 生命） */
    .card-badge--attack,
    .card-badge--hp {
      bottom: 0;
      width: 36px;
      height: 36px;
      border-radius: 50%;
    }

    .card-badge--attack {
      left: 0;
      transform: translate(-50%, 50%);
      background: linear-gradient(145deg, #1a7a6a, #0d4d40);
      border-color: rgba(100, 220, 200, 0.85);
    }

    .card-badge--hp {
      right: 0;
      transform: translate(50%, 50%);
      background: linear-gradient(145deg, #8b1a1a, #5c1010);
      border-color: rgba(255, 120, 110, 0.85);
    }

    .card-badge--attack input,
    .card-badge--hp input {
      font-size: 18px;
    }

    /* 下方：长方形（名称） */
    .card-badge--name {
      bottom: 0;
      left: 50%;
      width: calc(var(--card-w) * 0.72);
      height: 24px;
      transform: translate(-50%, 50%);
      border-radius: 6px;
      background: rgba(30, 38, 58, 0.96);
      border-color: rgba(210, 200, 140, 0.75);
      padding: 0 4px;
    }

    .card-badge--name input {
      font-size: 16px;
      font-weight: 600;
    }

    #image-input {
      position: fixed;
      left: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .card-slot:not(.has-image) .card-badge {
      display: none;
    }

    .card-slot:not(.has-image) .placeholder-hint {
      display: block;
    }

    /* ================================================================
       右侧聊天区域（系统信息 + 聊天大厅 + 发言按钮）
       ================================================================ */
    .chat-sidebar {
      width: var(--chat-width);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      gap: 8px;
      padding: 8px 4px;
      min-height: 0;
    }

    .chat-section {
      display: flex;
      flex-direction: column;
      min-height: 0;
      border: 2px solid rgba(150, 180, 220, 0.5);
      border-radius: 10px;
      background: rgba(15, 22, 38, 0.65);
      overflow: hidden;
    }

    .chat-section--system {
      flex: 2;
      border-color: rgba(180, 160, 255, 0.45);
    }

    .chat-section--player {
      flex: 3;
      border-color: rgba(255, 200, 100, 0.4);
    }

    .chat-section-title {
      flex-shrink: 0;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-align: center;
      border-bottom: 1px solid rgba(150, 180, 220, 0.3);
    }

    .chat-section--system .chat-section-title {
      background: rgba(45, 40, 70, 0.7);
      color: rgba(200, 190, 240, 0.95);
    }

    .chat-section--player .chat-section-title {
      background: rgba(50, 40, 25, 0.7);
      color: rgba(255, 210, 120, 0.95);
    }

    .chat-section-body {
      flex: 1;
      min-height: 60px;
      padding: 10px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* 统一发言按钮（位于中心线右侧） */
    .btn-speak-unified {
      flex-shrink: 0;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 600;
      background: linear-gradient(180deg, #5a8a5a, #3a6a3a);
      border: 1px solid rgba(140, 220, 140, 0.55);
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn-speak-unified:hover {
      background: linear-gradient(180deg, #6a9a6a, #4a7a4a);
    }

    .btn-speak-unified:active {
      transform: scale(0.98);
    }

    .btn-speak-unified:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .chat-bubble {
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(40, 55, 85, 0.85);
      border: 1px solid rgba(100, 130, 180, 0.35);
      font-size: 13px;
      line-height: 1.45;
      word-break: break-word;
    }

    .chat-bubble--player1 {
      align-self: flex-start;
      border-color: rgba(255, 200, 100, 0.4);
    }

    .chat-bubble--player2 {
      align-self: flex-start;
      border-color: rgba(140, 200, 255, 0.4);
    }

    .chat-bubble--player0 {
      align-self: flex-start;
      border-color: rgba(200, 180, 140, 0.4);
      background: rgba(55, 45, 30, 0.85);
    }

    .chat-bubble--system {
      align-self: flex-start;
      border-color: rgba(180, 160, 255, 0.45);
      background: rgba(45, 40, 70, 0.85);
      color: rgba(220, 210, 255, 0.95);
      font-weight: 500;
    }

    .chat-bubble .chat-speaker {
      color: rgba(255, 215, 0, 0.95);
      font-weight: 600;
    }

    /* ================================================================
       弹出对话框（发言、输入文本、列表）
       ================================================================ */
    .speak-dialog-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
    }

    .speak-dialog-overlay[hidden] {
      display: none;
    }

    .speak-dialog {
      width: min(420px, 100%);
      background: linear-gradient(160deg, #243050, #1a2540);
      border: 2px solid rgba(150, 180, 220, 0.5);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
    }

    .speak-dialog h3 {
      font-size: 16px;
      color: rgba(255, 215, 0, 0.95);
      margin-bottom: 12px;
      font-weight: 600;
    }

    .speak-dialog textarea {
      width: 100%;
      min-height: 88px;
      padding: 10px 12px;
      border: 1px solid #5a7090;
      border-radius: 8px;
      background: #1e2a3a;
      color: #eee;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      outline: none;
    }

    .speak-dialog textarea:focus {
      border-color: rgba(255, 215, 0, 0.6);
      box-shadow: 0 0 0 2px rgba(255, 215, 0, 0.12);
    }

    .speak-dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 14px;
    }

    .speak-dialog-actions button {
      padding: 8px 18px;
      font-size: 13px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid transparent;
    }

    .btn-dialog-cancel {
      background: rgba(60, 70, 90, 0.8);
      border-color: #5a7090;
      color: #ddd;
    }

    .btn-dialog-cancel:hover {
      background: rgba(70, 80, 100, 0.9);
    }

    .btn-dialog-confirm {
      background: linear-gradient(180deg, #5a7fb5, #3d5a80);
      border-color: #6b8cae;
      color: #fff;
      font-weight: 600;
    }

    .btn-dialog-confirm:hover {
      background: linear-gradient(180deg, #6a8fc5, #4d6a90);
    }

    /* 牌库 / 手牌列表弹窗 */
    .card-list-dialog {
      width: min(460px, 100%);
      max-height: min(70vh, 520px);
      display: flex;
      flex-direction: column;
    }

    .card-list-dialog .card-list {
      flex: 1;
      min-height: 80px;
      max-height: min(50vh, 380px);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
    }

    .card-list-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: rgba(40, 55, 85, 0.85);
      border: 1px solid rgba(100, 130, 180, 0.35);
      border-radius: 8px;
      font-size: 13px;
    }

    .card-list-item__name {
      flex: 1;
      min-width: 0;
      word-break: break-word;
    }

    .card-list-item__actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .btn-card-action {
      padding: 4px 10px;
      font-size: 11px;
      border-radius: 4px;
      border: 1px solid transparent;
      cursor: pointer;
      color: #fff;
    }

    .btn-card-use {
      background: #3d6a4a;
      border-color: #5a9a6a;
    }

    .btn-card-use:hover {
      background: #4d7a5a;
    }

    .btn-card-discard {
      background: #7a3d3d;
      border-color: #a05a5a;
    }

    .btn-card-discard:hover {
      background: #8a4d4d;
    }

    .card-list-empty {
      color: rgba(160, 180, 210, 0.65);
      font-size: 13px;
      text-align: center;
      padding: 24px 12px;
    }

    /* ================================================================
       房间连接界面（创建/加入房间覆盖层）
       ================================================================ */
    .room-overlay {
      position: fixed;
      inset: 0;
      background: rgba(5, 8, 18, 0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      padding: 16px;
    }

    .room-overlay[hidden] {
      display: none;
    }

    .room-dialog {
      width: min(440px, 100%);
      background: linear-gradient(160deg, #1e2d50, #162040);
      border: 2px solid rgba(150, 180, 220, 0.5);
      border-radius: 14px;
      padding: 28px 24px;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
      text-align: center;
    }

    .room-dialog h2 {
      font-size: 22px;
      color: rgba(255, 215, 0, 0.95);
      margin-bottom: 6px;
      font-weight: 700;
    }

    .room-dialog .room-subtitle {
      font-size: 13px;
      color: rgba(160, 180, 210, 0.8);
      margin-bottom: 24px;
    }

    .room-credits {
      margin-top: 16px;
      text-align: right;
      font-size: 11px;
      color: rgba(150, 170, 200, 0.5);
      letter-spacing: 0.5px;
    }

    .room-actions {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .room-btn {
      padding: 12px 20px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.2s, transform 0.1s;
      color: #fff;
    }

    .room-btn:active {
      transform: scale(0.98);
    }

    .room-btn--create {
      background: linear-gradient(180deg, #5a8a5a, #3a6a3a);
      border-color: rgba(140, 220, 140, 0.6);
    }

    .room-btn--create:hover {
      background: linear-gradient(180deg, #6a9a6a, #4a7a4a);
    }

    .room-btn--join {
      background: linear-gradient(180deg, #5a7fb5, #3d5a80);
      border-color: rgba(140, 190, 230, 0.6);
    }

    .room-btn--join:hover {
      background: linear-gradient(180deg, #6a8fc5, #4d6a90);
    }

    .room-btn--copy {
      background: linear-gradient(180deg, #8a7a4a, #6a5a3a);
      border-color: rgba(220, 200, 140, 0.6);
      font-size: 13px;
      padding: 8px 16px;
    }

    .room-btn--copy:hover {
      background: linear-gradient(180deg, #9a8a5a, #7a6a4a);
    }

    .room-btn--back {
      background: rgba(60, 70, 90, 0.8);
      border-color: #5a7090;
      color: #ddd;
      font-size: 13px;
      padding: 8px 16px;
    }

    .room-btn--back:hover {
      background: rgba(70, 80, 100, 0.9);
    }

    .room-join-row {
      display: flex;
      gap: 8px;
    }

    .room-join-row input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #5a7090;
      border-radius: 8px;
      background: #1e2a3a;
      color: #eee;
      font-size: 14px;
      text-align: center;
      outline: none;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .room-join-row input:focus {
      border-color: rgba(255, 215, 0, 0.6);
      box-shadow: 0 0 0 2px rgba(255, 215, 0, 0.12);
    }

    .room-id-display {
      margin: 16px 0;
      padding: 16px;
      background: rgba(15, 22, 38, 0.8);
      border: 2px dashed rgba(255, 215, 0, 0.5);
      border-radius: 10px;
    }

    .room-id-display .room-id-label {
      font-size: 12px;
      color: rgba(160, 180, 210, 0.7);
      margin-bottom: 6px;
    }

    .room-id-display .room-id-code {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 4px;
      color: rgba(255, 215, 0, 0.95);
      font-family: "Consolas", "Courier New", monospace;
      user-select: all;
    }

    .room-status {
      margin-top: 12px;
      font-size: 13px;
      color: rgba(160, 180, 210, 0.85);
    }

    .room-status .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    .room-status .dot--waiting {
      background: #e0a030;
      animation: pulse-dot 1.2s ease-in-out infinite;
    }

    .room-status .dot--connected {
      background: #40c060;
    }

    .room-status .dot--error {
      background: #e04040;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 0.4; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    /* ================================================================
       连接状态栏（游戏中顶部横幅）
       ================================================================ */
    .conn-status-bar {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1500;
      padding: 4px 14px;
      border-radius: 0 0 8px 8px;
      background: rgba(15, 22, 38, 0.92);
      border: 1px solid rgba(150, 180, 220, 0.4);
      border-top: none;
      font-size: 12px;
      color: rgba(180, 200, 220, 0.9);
      pointer-events: none;
    }

    .conn-status-bar[hidden] {
      display: none;
    }

    .conn-status-bar .conn-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }

    .conn-dot--ok { background: #40c060; }
    .conn-dot--warn { background: #e0a030; }

    /* ================================================================
       联机权限锁定样式（仅禁用牌库按钮）
       ================================================================ */
    .player-zone--locked .btn-deck {
      filter: grayscale(0.6);
      opacity: 0.45;
      pointer-events: none;
      cursor: not-allowed;
    }

    /* 中心线右侧：标签 + 发言按钮竖排 */
    .center-right-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    /* 中心栏区域标签通用样式（与发言按钮统一） */
    .center-dice-bar .zone-owner-tag {
      padding: 4px 12px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 600;
      pointer-events: none;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    .zone-owner-tag--yours {
      background: rgba(60, 180, 100, 0.35);
